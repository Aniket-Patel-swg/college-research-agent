name: deploy

# Build Node app → upload tarball to S3 → SSM Run Command on EC2 → restart systemd.
# Requires: EC2 + S3 deploy bucket exist (terraform apply) and instance registered in SSM.

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  TF_IN_AUTOMATION: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Read infra outputs
        id: infra
        run: |
          terraform init -input=false
          echo "instance_id=$(terraform output -raw instance_id)" >> "$GITHUB_OUTPUT"
          echo "deploy_bucket=$(terraform output -raw deploy_bucket)" >> "$GITHUB_OUTPUT"
          echo "agent_base_url=$(terraform output -raw agent_base_url)" >> "$GITHUB_OUTPUT"

      - name: Build release tarball
        working-directory: ${{ github.workspace }}
        run: |
          npm ci
          npm run build
          tar czf release.tar.gz dist package.json package-lock.json
          ls -la release.tar.gz

      - name: Upload release to S3
        working-directory: ${{ github.workspace }}
        env:
          DEPLOY_BUCKET: ${{ steps.infra.outputs.deploy_bucket }}
        run: |
          RELEASE_ID="${GITHUB_RUN_NUMBER}-$(git rev-parse --short=7 HEAD)"
          echo "RELEASE_ID=${RELEASE_ID}" >> "$GITHUB_ENV"
          aws s3 cp release.tar.gz "s3://${DEPLOY_BUCKET}/releases/${RELEASE_ID}.tar.gz" --region "$AWS_REGION"

      - name: Deploy on EC2 via SSM
        env:
          INSTANCE_ID: ${{ steps.infra.outputs.instance_id }}
          DEPLOY_BUCKET: ${{ steps.infra.outputs.deploy_bucket }}
        run: |
          set -euo pipefail
          : "${INSTANCE_ID:?}"
          : "${DEPLOY_BUCKET:?}"
          : "${RELEASE_ID:?}"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "GitHub deploy ${GITHUB_SHA}" \
            --parameters "commands=[
              \"export DEPLOY_BUCKET=${DEPLOY_BUCKET}\",
              \"export AWS_REGION=${AWS_REGION}\",
              \"sudo -E /opt/college-research-agent/bin/remote-deploy.sh ${RELEASE_ID}\"
            ]" \
            --region "$AWS_REGION" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command: $CMD_ID"
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$AWS_REGION"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --query Status \
            --output text)
          echo "SSM status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$AWS_REGION" \
              --query StandardErrorContent \
              --output text
            exit 1
          fi

      - name: Summary
        run: |
          {
            echo "### Deploy summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Release | \`${RELEASE_ID}\` |"
            echo "| Agent URL | ${{ steps.infra.outputs.agent_base_url }} |"
            echo "| Health | ${{ steps.infra.outputs.agent_base_url }}/health |"
          } >> "$GITHUB_STEP_SUMMARY"
